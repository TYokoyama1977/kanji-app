<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>漢字手書き入力デモ</title>
<script src="https://cdn.jsdelivr.net/gh/zacharyread/jlect-jhr/jlect-jhr.full.js"></script>
<style>
  #canvas {
    border: 1px solid #000;
    touch-action: none;
  }
  #result {
    font-size: 24px;
    margin-top: 10px;
    font-weight: bold;
  }
  /* 右下にバージョン表示 */
  #version {
    position: fixed;
    right: 10px;
    bottom: 10px;
    font-size: 14px;
    color: #555;
  }
</style>
</head>
<body>

<h2>漢字手書き入力デモ</h2>

<p>出題：<span id="question">人</span></p>

<canvas id="canvas" width="200" height="200"></canvas><br>

<button id="clearBtn">クリア</button>
<button id="recognizeBtn">認識</button>

<div id="candidates"></div>

<p>選んだ漢字：<input type="text" id="selectedKanji" readonly></p>

<button id="okBtn">OK</button>

<div id="result"></div>

<!-- バージョン表示 -->
<div id="version"></div>

<script>
  // --- バージョン情報 ---
  const APP_VERSION = "1.0.1";
  document.getElementById("version").textContent = "Version: " + APP_VERSION;

  // --- 手書きキャンバス ---
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  let drawing = false;

  canvas.addEventListener("mousedown", () => drawing = true);
  canvas.addEventListener("mouseup", () => drawing = false);
  canvas.addEventListener("mouseleave", () => drawing = false);
  canvas.addEventListener("mousemove", draw);

  function draw(e) {
    if (!drawing) return;
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(e.offsetX, e.offsetY, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  document.getElementById("clearBtn").onclick = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById("candidates").innerHTML = "";
    document.getElementById("selectedKanji").value = "";
    document.getElementById("result").textContent = "";
  };

  // --- 認識処理 ---
  document.getElementById("recognizeBtn").onclick = () => {
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

    // JHR 認識器
    const recognizer = new JHR.Recognizer();

    // strokes を生成
    const strokes = recognizer.imageToStrokes(img);

    // 認識（上位10件）
    const results = recognizer.recognize(strokes).slice(0, 10);

    const candidatesDiv = document.getElementById("candidates");
    candidatesDiv.innerHTML = "";

    results.forEach(r => {
      const btn = document.createElement("button");
      btn.textContent = r.character;  // JHR は character を返す
      btn.onclick = () => {
        document.getElementById("selectedKanji").value = r.character;
      };
      candidatesDiv.appendChild(btn);
    });
  };

  // --- OKボタンで判定 ---
  document.getElementById("okBtn").onclick = () => {
    const question = document.getElementById("question").textContent;
    const answer = document.getElementById("selectedKanji").value;
    const result = document.getElementById("result");

    if (answer === "") {
      result.textContent = "漢字を選んでください";
      result.style.color = "black";
      return;
    }

    if (question === answer) {
      result.textContent = "正解！";
      result.style.color = "green";
    } else {
      result.textContent = "間違い…";
      result.style.color = "red";
    }
  };
</script>

</body>
</html>
