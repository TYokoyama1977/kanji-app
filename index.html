<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>手書き漢字認識デモ</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 20px;
        }
        #canvas {
            border: 2px solid #333;
            touch-action: none;
        }
        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>

    <!-- JHR（手書き漢字認識ライブラリ） -->
    <script src="https://unpkg.com/japanese-handwriting-recognizer/dist/jhr.js"></script>
</head>
<body>

<h2>手書き → 漢字認識デモ</h2>

<canvas id="canvas" width="300" height="300"></canvas>
<br><br>

<button id="clearBtn">クリア</button>
<button id="recognizeBtn">認識</button>

<div id="result">認識結果：まだなし</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const clearBtn = document.getElementById("clearBtn");
    const recognizeBtn = document.getElementById("recognizeBtn");
    const resultDiv = document.getElementById("result");

    let drawing = false;

    // --- 手書き ---
    canvas.addEventListener("mousedown", () => {
        drawing = true;
        ctx.beginPath();
    });

    canvas.addEventListener("mouseup", () => {
        drawing = false;
    });

    canvas.addEventListener("mousemove", (e) => {
        if (!drawing) return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        ctx.lineWidth = 10;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000";

        ctx.lineTo(x, y);
        ctx.stroke();
    });

    // --- クリア ---
    clearBtn.addEventListener("click", () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        resultDiv.textContent = "認識結果：まだなし";
    });

    // --- 認識 ---
    recognizeBtn.addEventListener("click", async () => {
        resultDiv.textContent = "認識中…";

        // キャンバスを PNG に変換
        const dataURL = canvas.toDataURL("image/png");

        // JHR で認識
        const jhr = new JHR();
        const result = await jhr.recognize(dataURL);

        if (result && result.length > 0) {
            resultDiv.textContent = "認識結果：" + result[0].character;
        } else {
            resultDiv.textContent = "認識できませんでした";
        }
    });
</script>

</body>
</html>
